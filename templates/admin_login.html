<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>

    body{
        background:#111;
        font-family:Arial;
    }

    .login-box{

        width:400px;
        margin:120px auto;

        background:white;

        padding:30px;

        border-radius:10px;
    }

    input{

        width:100%;
        padding:12px;

        margin-bottom:15px;
    }

    button{

        width:100%;

        padding:12px;

        background:#c9a84c;

        border:none;

        color:white;

        font-weight:bold;
    }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Meera Valley Admin</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
